[tool.ruff]
target-version = "py311"
line-length = 120
src = ["backend"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "S",     # flake8-bandit (security)
    "SIM",   # flake8-simplify
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "S101",  # assert in tests is fine
    "S603",  # subprocess calls (false positives)
    "S607",  # partial executable path
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S101", "S106"]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]
asyncio_mode = "auto"
markers = [
    "unit: pure logic, no external dependencies",
    "integration: requires Neo4j or external APIs",
]
